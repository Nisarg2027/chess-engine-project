# -----------------------------------
# DATABASE CONFIGURATION (Dynamic)
# -----------------------------------
# If the cloud provides a DATABASE_URL, use it. Otherwise, fallback to the local H2 file.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./chess_local_db;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASS:password}

# -----------------------------------
# HIBERNATE & JPA SETTINGS
# -----------------------------------
# Auto-update the database schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}

# Enable the H2 Web Console (Only works locally)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console